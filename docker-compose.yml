version: '3.8'

services:
  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
      - USER_SERVICE_URL=http://user-service:8000
      - BOOKING_SERVICE_URL=http://booking-service:8002
      - EVENT_SERVICE_URL=http://event-service:8001
      - ACTIVITY_SERVICE_URL=http://activity-service:8000
    depends_on:
      user-service:
        condition: service_started
      booking-service:
        condition: service_started
      event-service:
        condition: service_started
      activity-service:
        condition: service_started

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/user_db
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      postgres:
        condition: service_healthy

  event-service:
    build:
      context: ./services/event-service
    container_name: event-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/user_db
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
    depends_on:
      postgres:
        condition: service_healthy

  booking-service:
    build:
      context: ./services/booking-service
    container_name: booking-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/user_db
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  activity-service:
    build:
      context: ./services/activity-service
    container_name: activity-service
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/user_db
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
